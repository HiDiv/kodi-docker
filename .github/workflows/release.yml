name: Release Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v0.1.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/hidiv/kodi-docker

jobs:
  build-kodi:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: "19"
            dockerfile: docker/Dockerfile.kodi19
          - version: "20"
            dockerfile: docker/Dockerfile.kodi20
          - version: "21"
            dockerfile: docker/Dockerfile.kodi21
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kodi${{ matrix.version }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:kodi${{ matrix.version }}-${{ steps.tag.outputs.VERSION }}
            ${{ env.IMAGE_BASE }}:kodi${{ matrix.version }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push e2e runner
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.e2e
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:e2e-${{ steps.tag.outputs.VERSION }}
            ${{ env.IMAGE_BASE }}:e2e-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [build-kodi, build-e2e]
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            docker pull ghcr.io/hidiv/kodi-docker:kodi20-${{ github.ref_name }}
            docker pull ghcr.io/hidiv/kodi-docker:kodi19-${{ github.ref_name }}
            docker pull ghcr.io/hidiv/kodi-docker:kodi21-${{ github.ref_name }}
            docker pull ghcr.io/hidiv/kodi-docker:e2e-${{ github.ref_name }}
            ```
